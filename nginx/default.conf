upstream frontend {
    server frontend:3001;
}

upstream backend {
    server backend:8001;
}

# ── HTTP — redirect to HTTPS (except certbot challenge) ──────────────────────
server {
    listen 80;
    server_name cornerterritory.com www.cornerterritory.com;

    client_max_body_size 10M;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://cornerterritory.com$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cornerterritory.com www.cornerterritory.com;

    client_max_body_size 10M;

    ssl_certificate     /etc/nginx/ssl/live/cornerterritory.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/cornerterritory.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media files
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
