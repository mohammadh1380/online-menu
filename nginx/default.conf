upstream frontend {
    server frontend:3001;
}

upstream backend {
    server backend:8001;
}

server {
    listen 80;
    server_name cornerterritory.com www.cornerterritory.com;

    client_max_body_size 10M;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml
               font/woff font/woff2 application/font-woff2;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Next.js static assets — cache 1 year ─────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public files (fonts, images) — cache 1 week ──────────────────────────
    location ~* \.(woff2|woff|ttf|png|jpg|jpeg|webp|ico|svg)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Media uploads ────────────────────────────────────────────────────────
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
